services:
  db:
    image: postgres:16-alpine
    container_name: flyforecast-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flyforecast}
      POSTGRES_USER: ${POSTGRES_USER:-flyforecast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flyforecast}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: flyforecast-backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  collector:
    build:
      context: ./backend
    container_name: flyforecast-collector
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./pipelines:/app/pipelines:ro
    command: python /app/pipelines/flight_status/collect_kunashir_status.py --loop --interval-seconds 3600 --skip-aurora
    restart: unless-stopped

  forecast_monitor:
    build:
      context: ./backend
    container_name: flyforecast-monitor
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./pipelines:/app/pipelines:ro
    command: python /app/pipelines/evaluation/forecast_monitor.py --loop --interval-seconds 3600
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    container_name: flyforecast-frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
