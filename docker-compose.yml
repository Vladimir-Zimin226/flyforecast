services:
  backend:
    build:
      context: ./backend
    container_name: flyforecast-backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  collector:
    build:
      context: ./backend
    container_name: flyforecast-collector
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./pipelines:/app/pipelines:ro
    command: python /app/pipelines/flight_status/collect_kunashir_status.py --loop --interval-seconds 3600
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: flyforecast-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
