<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" aria-hidden="true" role="img">
  <style>
    .cloud-back { animation: cloudBack 13s ease-in-out infinite alternate; }
    .cloud-front { animation: cloudFront 10s ease-in-out infinite alternate; }
    .plane-float { transform-origin: 80px 80px; animation: planeFloat 5s ease-in-out infinite; }
    .sun-core { transform-origin: 48px 18px; animation: sunPulse 3.4s ease-in-out infinite; }
    .sun-glow { transform-origin: 48px 18px; animation: sunGlow 4s ease-in-out infinite; }
    .ray-ring { transform-origin: 48px 18px; animation: raySpin 16s linear infinite; }
    .streak.s1 { animation: streakMove 3.2s ease-in-out infinite; }
    .streak.s2 { animation: streakMove 3.8s ease-in-out infinite; }
    .streak.s3 { animation: streakMove 4.4s ease-in-out infinite; }
    .d1 { animation-delay: -0.8s; }
    .d2 { animation-delay: -1.5s; }
    .d3 { animation-delay: -2.1s; }
    @keyframes cloudBack { 0% { transform: translateX(-3px) translateY(0); } 100% { transform: translateX(4px) translateY(-1px); } }
    @keyframes cloudFront { 0% { transform: translateX(4px) translateY(0); } 100% { transform: translateX(-5px) translateY(1px); } }
    @keyframes planeFloat { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-1px) rotate(1deg); } }
    @keyframes sunPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes sunGlow { 0%, 100% { opacity: 0.44; transform: scale(1); } 50% { opacity: 0.62; transform: scale(1.08); } }
    @keyframes raySpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes streakMove { 0% { transform: translateX(0) translateY(0); opacity: 0.18; } 50% { opacity: 0.5; } 100% { transform: translateX(3px) translateY(-3px); opacity: 0.15; } }
  </style>
  <defs>
    <linearGradient id="cloudGradBack" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8eff7"/><stop offset="100%" stop-color="#c6d5e5"/></linearGradient>
    <linearGradient id="cloudGradFront" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f4f8fd"/><stop offset="100%" stop-color="#d5e1ee"/></linearGradient>
    <linearGradient id="planeGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e7edf4"/></linearGradient>
    <linearGradient id="planeShade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#dce5ef"/></linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe88b"/><stop offset="100%" stop-color="#f7b733"/></linearGradient>
    <radialGradient id="sunGlowGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffe89a" stop-opacity="0.55"/><stop offset="100%" stop-color="#ffe89a" stop-opacity="0"/></radialGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#27415a" flood-opacity="0.12"/></filter>
    <filter id="planeShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#24364d" flood-opacity="0.16"/></filter>
  </defs>
