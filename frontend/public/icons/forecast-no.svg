<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" aria-hidden="true" role="img">
  <style>
    .cloud-back { animation: cloudBack 12s ease-in-out infinite alternate; }
    .cloud-front { animation: cloudFront 9s ease-in-out infinite alternate; }
    .plane-float { transform-origin: 80px 80px; animation: planeFloat 4.8s ease-in-out infinite; }
    .ban-overlay { transform-origin: 80px 80px; animation: banPulse 2.8s ease-in-out infinite; }
    .rain.r1 { animation: rainFall 2.9s linear infinite; }
    .rain.r2 { animation: rainFall 2.3s linear infinite; }
    .rain.r3 { animation: rainFall 1.8s linear infinite; }
    .d1 { animation-delay: -0.4s; } .d2 { animation-delay: -0.9s; } .d3 { animation-delay: -1.3s; } .d4 { animation-delay: -1.8s; } .d5 { animation-delay: -2.2s; }
    @keyframes cloudBack { 0% { transform: translateX(-3px); } 100% { transform: translateX(4px); } }
    @keyframes cloudFront { 0% { transform: translateX(4px); } 100% { transform: translateX(-5px); } }
    @keyframes rainFall { 0% { transform: translateY(-3px); opacity: 0.14; } 20% { opacity: 0.55; } 100% { transform: translateY(9px); opacity: 0.12; } }
    @keyframes banPulse { 0%, 100% { transform: scale(1); opacity: 0.96; } 50% { transform: scale(1.025); opacity: 1; } }
    @keyframes planeFloat { 0%, 100% { transform: rotate(-1.2deg) translateY(0); } 50% { transform: rotate(1.2deg) translateY(1px); } }
  </style>
  <defs>
    <linearGradient id="cloudGradBack" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d5dde8"/><stop offset="100%" stop-color="#aab9cb"/></linearGradient>
    <linearGradient id="cloudGradFront" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c3cfdd"/><stop offset="100%" stop-color="#92a6be"/></linearGradient>
    <linearGradient id="planeGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e7edf4"/></linearGradient>
    <linearGradient id="planeShade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#dce5ef"/></linearGradient>
    <linearGradient id="banGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6168"/><stop offset="100%" stop-color="#d9303c"/></linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#20344c" flood-opacity="0.15"/></filter>
    <filter id="planeShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#24364d" flood-opacity="0.18"/></filter>
  </defs>
